# CareerOS 用户画像示例
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# 首次使用：
#   1. 启动后在「系统设置 → 个人画像」里填写（系统会自动创建 data/user_profile.yaml）
#   2. 或者：cp data/user_profile.example.yaml data/user_profile.yaml 然后手改
#
# 所有页面（邮件模板、简历定制、面试准备）都会读这份画像。
#
# 注意：下面所有字段**留空**，填写前系统会用 "<占位符>" 提示，避免误导。

user:
  name: ""
  name_en: ""
  school: ""
  major: ""
  graduation_year: ""
  degree: ""
  email: ""
  phone: ""
  city: ""

career:
  # 目标岗位方向（按权重降序，至少 1 个）
  target_roles: []

  # 核心 JD 关键词（用于匹配评分）
  jd_keywords: []

  # P0 主攻公司（最优先投递）
  target_companies_p0: []

  # P1 积极投递
  target_companies_p1: []

  # 明确排除（不想投的公司，扫描时自动过滤）
  excluded_companies: []

  # 内推码（{公司名: 内推码字符串}）
  referral_codes: {}

  # 一句话核心亮点（会注入邮件/内推模板的 {highlights} 占位）
  highlights: ""
